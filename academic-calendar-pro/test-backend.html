<!DOCTYPE html>\n<html>\n<head>\n    <title>Backend Test</title>\n</head>\n<body>\n    <h1>Backend Connectivity Test</h1>\n    <button onclick=\"testLogin()\">Test Login</button>\n    <button onclick=\"testRegister()\">Test Register</button>\n    <div id=\"result\"></div>\n\n    <script>\n        async function testLogin() {\n            try {\n                const response = await fetch('http://localhost:8080/auth/login', {\n                    method: 'POST',\n                    headers: {\n                        'Content-Type': 'application/json',\n                    },\n                    body: JSON.stringify({\n                        email: 'test@example.com',\n                        password: 'password'\n                    })\n                });\n                const data = await response.text();\n                document.getElementById('result').innerHTML = `Login Response: ${response.status} - ${data}`;\n            } catch (error) {\n                document.getElementById('result').innerHTML = `Login Error: ${error.message}`;\n            }\n        }\n\n        async function testRegister() {\n            try {\n                const response = await fetch('http://localhost:8080/auth/register', {\n                    method: 'POST',\n                    headers: {\n                        'Content-Type': 'application/json',\n                    },\n                    body: JSON.stringify({\n                        name: 'Test User',\n                        email: 'test@example.com',\n                        password: 'password',\n                        role: 'REVIEWER',\n                        department: 'IT'\n                    })\n                });\n                const data = await response.text();\n                document.getElementById('result').innerHTML = `Register Response: ${response.status} - ${data}`;\n            } catch (error) {\n                document.getElementById('result').innerHTML = `Register Error: ${error.message}`;\n            }\n        }\n    </script>\n</body>\n</html>
